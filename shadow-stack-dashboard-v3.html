<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Stack v3.2 — Auto-Router Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --blue: #58a6ff;
  --green: #3fb950;
  --purple: #bc8cff;
  --orange: #f0883e;
  --red: #f85149;
  --yellow: #d29922;
  --cyan: #39d2c0;
  --pink: #f778ba;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  cursor: none;
  overflow-x: hidden;
}

.cursor {
  width: 20px; height: 20px;
  border: 2px solid #fff;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  mix-blend-mode: difference;
  transition: transform 0.15s ease, width 0.15s, height 0.15s;
}
.cursor.hover {
  width: 40px; height: 40px;
  transform: translate(-10px, -10px);
}

.header {
  padding: 24px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo span {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 500;
  background: none;
  -webkit-text-fill-color: var(--text-dim);
  margin-left: 8px;
}
.status-badge {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(63, 185, 80, 0.1);
  border: 1px solid rgba(63, 185, 80, 0.3);
  font-size: 13px;
}
.pulse-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.5); }
}

.tabs {
  display: flex;
  gap: 4px;
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: none;
  transition: all 0.3s ease;
  white-space: nowrap;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  user-select: none;
}
.tab:hover { background: var(--surface); color: var(--text); }
.tab.active {
  background: var(--surface2);
  border-color: var(--blue);
  color: var(--blue);
}

.content {
  padding: 24px 32px;
  max-width: 1400px;
  margin: 0 auto;
}
.tab-panel { display: none; animation: fadeIn 0.4s ease; }
.tab-panel.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: all 0.3s ease;
}
.card:hover {
  border-color: var(--blue);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.card-blue { border-left: 3px solid var(--blue); }
.card-green { border-left: 3px solid var(--green); }
.card-purple { border-left: 3px solid var(--purple); }
.card-orange { border-left: 3px solid var(--orange); }
.card-red { border-left: 3px solid var(--red); }
.card-cyan { border-left: 3px solid var(--cyan); }

.card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 12px;
}

.bento { display: grid; gap: 16px; }
.bento-2x2 { grid-template-columns: repeat(2, 1fr); }
.bento-3 { grid-template-columns: repeat(3, 1fr); }
.bento-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 900px) {
  .bento-2x2, .bento-3, .bento-4 { grid-template-columns: 1fr; }
}

.flow {
  display: flex;
  align-items: center;
  gap: 0;
  overflow-x: auto;
  padding: 20px 0;
  scrollbar-width: none;
}
.flow::-webkit-scrollbar { display: none; }
.flow-node {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.3s;
}
.flow-node:hover { border-color: var(--cyan); transform: scale(1.05); }
.flow-arrow {
  display: flex;
  align-items: center;
  padding: 0 4px;
  flex-shrink: 0;
}
.flow-arrow svg { width: 40px; height: 20px; }
.flow-arrow path {
  stroke: var(--blue);
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 8 4;
  animation: dashMove 1s linear infinite;
}
@keyframes dashMove { to { stroke-dashoffset: -12; } }

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 700;
  margin: 28px 0 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.tag-green { background: rgba(63,185,80,0.15); color: var(--green); }
.tag-blue { background: rgba(88,166,255,0.15); color: var(--blue); }
.tag-purple { background: rgba(188,140,255,0.15); color: var(--purple); }
.tag-orange { background: rgba(240,136,62,0.15); color: var(--orange); }
.tag-red { background: rgba(248,81,73,0.15); color: var(--red); }
.tag-yellow { background: rgba(210,153,34,0.15); color: var(--yellow); }
.tag-cyan { background: rgba(57,210,192,0.15); color: var(--cyan); }

.simulator {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-top: 16px;
}
.sim-input-wrap {
  display: flex; gap: 12px; margin-bottom: 24px;
}
.sim-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  color: var(--text);
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}
.sim-input:focus { border-color: var(--blue); }
.sim-btn {
  padding: 14px 28px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  cursor: none;
  transition: transform 0.2s, box-shadow 0.2s;
}
.sim-btn:hover { transform: scale(1.03); box-shadow: 0 4px 20px rgba(88,166,255,0.3); }
.sim-result {
  min-height: 120px;
  position: relative;
}
.sim-providers {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.sim-provider {
  padding: 12px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 13px;
  transition: all 0.5s ease;
  opacity: 0.4;
}
.sim-provider.checking {
  border-color: var(--yellow);
  opacity: 0.7;
  animation: checking 0.6s ease infinite alternate;
}
@keyframes checking { to { border-color: var(--orange); } }
.sim-provider.selected {
  border-color: var(--green);
  background: rgba(63,185,80,0.08);
  opacity: 1;
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(63,185,80,0.15);
}
.sim-provider.rejected {
  opacity: 0.2;
  text-decoration: line-through;
}
.sim-provider .provider-name { font-weight: 700; margin-bottom: 4px; }
.sim-provider .provider-info { font-size: 11px; color: var(--text-dim); }

.phase { margin-bottom: 20px; }
.phase-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.phase-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 18px;
}
.phase-progress-wrap {
  flex: 1;
  margin-left: 16px;
  height: 6px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}
.phase-progress-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.phase-pct { font-size: 13px; font-weight: 700; margin-left: 12px; min-width: 40px; text-align: right; }
.phase-tasks { display: flex; flex-direction: column; gap: 6px; }
.phase-task {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 14px;
  background: var(--bg);
  border-radius: 8px;
  font-size: 13px;
  cursor: none;
  transition: background 0.2s;
  user-select: none;
}
.phase-task:hover { background: var(--surface2); }
.phase-task.done { color: var(--text-dim); }
.phase-task.done .task-check { background: var(--green); border-color: var(--green); }
.task-check {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
  font-size: 10px;
  color: white;
}

.ram-bar-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  margin-bottom: 24px;
}
.ram-bar-total {
  height: 40px;
  background: var(--bg);
  border-radius: 8px;
  display: flex;
  overflow: hidden;
  margin: 16px 0;
}
.ram-segment {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  transition: all 0.5s ease;
  overflow: hidden;
  white-space: nowrap;
}
.ram-legend {
  display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px;
}
.ram-legend-item {
  display: flex; align-items: center; gap: 6px; font-size: 12px;
}
.ram-legend-dot {
  width: 10px; height: 10px; border-radius: 3px;
}

.risk-table {
  width: 100%;
  border-collapse: collapse;
}
.risk-table th, .risk-table td {
  padding: 12px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.risk-table th {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  color: var(--text-dim);
}

.state-machine {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 0;
  padding: 40px 0;
}
.state-node {
  width: 130px; height: 130px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--border);
  background: var(--surface);
  font-weight: 700;
  font-size: 14px;
  transition: all 0.4s ease;
  position: relative;
}
.state-node.active {
  border-color: var(--cyan);
  box-shadow: 0 0 30px rgba(57,210,192,0.25);
}
.state-node.active::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 2px solid var(--cyan);
  animation: statePulse 2s ease infinite;
}
@keyframes statePulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0; transform: scale(1.15); }
}
.state-node .state-icon { font-size: 28px; margin-bottom: 6px; }
.state-arrow {
  width: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.state-arrow svg { width: 50px; height: 20px; }
.state-arrow path {
  stroke: var(--border);
  stroke-width: 2;
  fill: none;
  stroke-dasharray: 6 4;
  animation: dashMove 1.5s linear infinite;
}

.install-block {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 12px;
  position: relative;
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px;
  line-height: 1.8;
  color: var(--cyan);
  overflow-x: auto;
}
.copy-btn {
  position: absolute;
  top: 10px; right: 10px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-dim);
  font-size: 11px;
  font-family: 'Syne', sans-serif;
  cursor: none;
  transition: all 0.2s;
}
.copy-btn:hover { border-color: var(--green); color: var(--green); }
.copy-btn.copied { border-color: var(--green); color: var(--green); }

.integration-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}
.int-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  transition: all 0.3s;
}
.int-card:hover { transform: translateY(-3px); border-color: var(--blue); }
.int-card .int-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
.int-card .int-status { font-size: 11px; }

.map-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  min-height: 400px;
  position: relative;
  overflow: hidden;
}
.map-container canvas {
  width: 100%;
  height: 450px;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<header class="header">
  <div class="logo">Shadow Stack <span>v3.2 Dashboard</span></div>
  <div class="status-badge">
    <div class="pulse-dot"></div>
    System Online
  </div>
</header>

<nav class="tabs" id="tabs"></nav>

<main class="content" id="mainContent"></main>

<script>
// === Data ===
var TAB_DATA = [
  { id: 'arch', label: '1. \u0410\u0440\u0445\u0438\u0442\u0435\u043a\u0442\u0443\u0440\u0430' },
  { id: 'map', label: '2. \u041a\u0430\u0440\u0442\u0430 \u0441\u0438\u0441\u0442\u0435\u043c\u044b' },
  { id: 'router', label: '3. \u0410\u0432\u0442\u043e-\u0440\u043e\u0443\u0442\u0435\u0440' },
  { id: 'phases', label: '4. \u0424\u0430\u0437\u044b / \u0417\u0430\u0434\u0430\u0447\u0438' },
  { id: 'install', label: '5. \u0423\u0441\u0442\u0430\u043d\u043e\u0432\u043a\u0430' },
  { id: 'state', label: '6. State Machine' },
  { id: 'ram', label: '7. RAM & \u0420\u0438\u0441\u043a\u0438' },
  { id: 'integrations', label: '8. \u0418\u043d\u0442\u0435\u0433\u0440\u0430\u0446\u0438\u0438' }
];

var phases = [
  { name: 'Phase 1: Core Auto-Router', color: 'var(--green)', tasks: [
    { text: 'auto-router.ts + providers', done: true },
    { text: 'SKILL.md routing rules', done: true },
    { text: 'Telegram webhook rewrite', done: true },
    { text: 'HTML Dashboard v1', done: true },
    { text: 'ngrok tunnel setup', done: true },
  ]},
  { name: 'Phase 2: Antigravity + Monitoring', color: 'var(--blue)', tasks: [
    { text: 'Antigravity Gemini provider', done: true },
    { text: 'Usage monitoring (in-memory)', done: true },
    { text: 'Quota-aware routing (90%)', done: true },
    { text: 'Extended fallback cascade (5)', done: true },
    { text: 'Dashboard quota sliders', done: true },
  ]},
  { name: 'Phase 3: Meta-Escalation', color: 'var(--purple)', tasks: [
    { text: 'metaEscalate.ts (3-tier chain)', done: true },
    { text: 'Perplexity \u2192 GPT-4o \u2192 Human', done: true },
    { text: '/escalate Telegram command', done: true },
    { text: 'CLAUDE.md meta-escalation rules', done: true },
    { text: 'Dashboard meta-escalation panel', done: false },
  ]},
  { name: 'Phase 4: Observability & Security', color: 'var(--orange)', tasks: [
    { text: 'SSE log streaming', done: false },
    { text: 'Retry analytics dashboard', done: false },
    { text: 'Supabase integration', done: false },
    { text: 'Security scan + audit', done: false },
  ]},
  { name: 'Phase 5: Documentation & Deploy', color: 'var(--red)', tasks: [
    { text: 'RUNBOOK.md', done: false },
    { text: 'AGENTS.md', done: false },
    { text: 'Final production deploy', done: false },
  ]},
];

// === Build Tabs ===
(function() {
  var tabsNav = document.getElementById('tabs');
  TAB_DATA.forEach(function(t, i) {
    var el = document.createElement('div');
    el.className = 'tab' + (i === 0 ? ' active' : '');
    el.dataset.tab = t.id;
    el.textContent = t.label;
    tabsNav.appendChild(el);
  });
})();

// === Build Content ===
function buildContent() {
  var main = document.getElementById('mainContent');

  // Clear
  while (main.firstChild) main.removeChild(main.firstChild);

  // Tab 1: Architecture
  var archPanel = createPanel('arch', true);
  appendTitle(archPanel, 'Request Flow');
  appendFlow(archPanel);
  appendTitle(archPanel, 'Architecture Layers');
  appendArchLayers(archPanel);
  appendTitle(archPanel, 'Tech Stack');
  appendTechStack(archPanel);
  main.appendChild(archPanel);

  // Tab 2: System Map
  var mapPanel = createPanel('map', false);
  appendTitle(mapPanel, 'System Flowchart');
  var mapContainer = document.createElement('div');
  mapContainer.className = 'map-container';
  var canvas = document.createElement('canvas');
  canvas.id = 'mapCanvas';
  mapContainer.appendChild(canvas);
  mapPanel.appendChild(mapContainer);
  main.appendChild(mapPanel);

  // Tab 3: Auto-Router
  var routerPanel = createPanel('router', false);
  appendTitle(routerPanel, 'Auto-Router Simulator');
  appendSimulator(routerPanel);
  appendTitle(routerPanel, 'Routing Rules');
  appendRoutingRules(routerPanel);
  main.appendChild(routerPanel);

  // Tab 4: Phases
  var phasesPanel = createPanel('phases', false);
  appendTitle(phasesPanel, 'Development Phases');
  var phasesContainer = document.createElement('div');
  phasesContainer.id = 'phasesContainer';
  phasesPanel.appendChild(phasesContainer);
  main.appendChild(phasesPanel);
  renderPhases();

  // Tab 5: Install
  var installPanel = createPanel('install', false);
  appendTitle(installPanel, 'Installation Commands');
  var cmds = [
    'brew install ollama jq ngrok node',
    'cargo install zeroclaw',
    'npm install -g n8n bun vercel',
    'ollama pull qwen2.5-coder:3b',
    'ollama pull qwen2.5:7b',
    'zeroclaw onboard channels-only',
    'cd shadow-stack-widget-1 && npm install',
    'node --env-file=.env server/index.js'
  ];
  cmds.forEach(function(cmd) { appendInstallBlock(installPanel, cmd); });
  main.appendChild(installPanel);

  // Tab 6: State Machine
  var statePanel = createPanel('state', false);
  appendTitle(statePanel, 'Auto-Router State Machine');
  appendStateMachine(statePanel);
  appendTitle(statePanel, 'Transitions');
  appendStateTransitions(statePanel);
  main.appendChild(statePanel);

  // Tab 7: RAM & Risks
  var ramPanel = createPanel('ram', false);
  appendTitle(ramPanel, 'RAM Monitor (8 GB)');
  appendRAM(ramPanel);
  appendTitle(ramPanel, 'Risk Assessment');
  appendRisks(ramPanel);
  main.appendChild(ramPanel);

  // Tab 8: Integrations
  var intPanel = createPanel('integrations', false);
  appendIntegrations(intPanel);
  main.appendChild(intPanel);
}

function createPanel(id, active) {
  var el = document.createElement('section');
  el.className = 'tab-panel' + (active ? ' active' : '');
  el.id = 'panel-' + id;
  return el;
}

function appendTitle(parent, text) {
  var el = document.createElement('div');
  el.className = 'section-title';
  el.textContent = text;
  parent.appendChild(el);
}

function appendFlow(parent) {
  var flowData = [
    { label: '\ud83d\udc64 User', color: 'var(--blue)' },
    { label: '\u26a1 ZeroClaw', color: 'var(--cyan)' },
    { label: '\ud83e\udde0 Qwen3B 10ms', color: 'var(--purple)' },
    { label: '\ud83c\udfed LLM Provider', color: 'var(--green)' },
    { label: '\ud83d\udcac Response', color: 'var(--orange)' }
  ];
  var flow = document.createElement('div');
  flow.className = 'flow';
  flowData.forEach(function(item, i) {
    var node = document.createElement('div');
    node.className = 'flow-node';
    node.style.borderColor = item.color;
    node.textContent = item.label;
    flow.appendChild(node);
    if (i < flowData.length - 1) {
      var arrow = document.createElement('div');
      arrow.className = 'flow-arrow';
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 40 20');
      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', 'M0,10 L30,10 M25,5 L30,10 L25,15');
      svg.appendChild(path);
      arrow.appendChild(svg);
      flow.appendChild(arrow);
    }
  });
  parent.appendChild(flow);

function renderPhases() {
  var container = document.getElementById('phasesContainer');
  if (!container) return;
  while (container.firstChild) container.removeChild(container.firstChild);

  phases.forEach(function(phase, pi) {
    var doneCount = phase.tasks.filter(function(t) { return t.done; }).length;
    var pct = Math.round((doneCount / phase.tasks.length) * 100);

    var div = document.createElement('div');
    div.className = 'phase';

    var header = document.createElement('div');
    header.className = 'phase-header';

    var title = document.createElement('div');
    title.className = 'phase-title';
    title.style.color = phase.color;
    title.textContent = phase.name;
    header.appendChild(title);

    var progressWrap = document.createElement('div');
    progressWrap.className = 'phase-progress-wrap';
    var progressBar = document.createElement('div');
    progressBar.className = 'phase-progress-bar';
    progressBar.style.width = pct + '%';
    progressBar.style.background = phase.color;
    progressWrap.appendChild(progressBar);
    header.appendChild(progressWrap);

    var pctEl = document.createElement('div');
    pctEl.className = 'phase-pct';
    pctEl.style.color = phase.color;
    pctEl.textContent = pct + '%';
    header.appendChild(pctEl);

    div.appendChild(header);

    var tasksDiv = document.createElement('div');
    tasksDiv.className = 'phase-tasks';
    phase.tasks.forEach(function(t, ti) {
      var taskEl = document.createElement('div');
      taskEl.className = 'phase-task' + (t.done ? ' done' : '');
      taskEl.addEventListener('click', (function(pIdx, tIdx) {
        return function() {
          phases[pIdx].tasks[tIdx].done = !phases[pIdx].tasks[tIdx].done;
          renderPhases();
        };
      })(pi, ti));

      var check = document.createElement('div');
      check.className = 'task-check';
      if (t.done) check.textContent = '\u2713';
      taskEl.appendChild(check);

      var span = document.createElement('span');
      span.textContent = t.text;
      taskEl.appendChild(span);

      tasksDiv.appendChild(taskEl);
    });
    div.appendChild(tasksDiv);
    container.appendChild(div);
  });
}

// === Simulator Logic ===
function simulateRoute() {
  var input = document.getElementById('simInput').value.trim();
  if (!input) return;
  var providers = document.querySelectorAll('.sim-provider');
  var log = document.getElementById('simLog');

  providers.forEach(function(p) { p.className = 'sim-provider'; });
  log.textContent = '';

  var target = 'ollama-3b';
  var reason = 'Short query (<80 chars) \u2192 local Ollama 3B';

  if (input.indexOf('/deep') === 0) { target = 'perplexity'; reason = '/deep command \u2192 Perplexity (subscription)'; }
  else if (input.indexOf('/grok') === 0) { target = 'grok'; reason = '/grok command \u2192 Grok API'; }
  else if (input.indexOf('/kimi') === 0) { target = 'kimi'; reason = '/kimi command \u2192 Kimi (moonshot.ai)'; }
  else if (input.indexOf('/deploy') === 0) { target = 'vercel'; reason = '/deploy command \u2192 Vercel CLI'; }
  else if (input.indexOf('/premium') === 0) { target = 'claude'; reason = '/premium command \u2192 Claude Sonnet (paid)'; }
  else if (input.length > 80 || /\u0430\u043d\u0430\u043b\u0438\u0437|explain|review|debug|refactor/i.test(input)) {
    target = 'ollama-7b'; reason = 'Long/analysis query \u2192 Ollama 7B';
  }

  var providerOrder = ['ollama-3b','ollama-7b','antigravity','openrouter','perplexity','grok','kimi','claude','vercel'];
  var targetIdx = providerOrder.indexOf(target);

  providerOrder.forEach(function(p, i) {
    var el = document.querySelector('[data-provider="' + p + '"]');
    if (!el) return;
    if (i <= targetIdx) {
      setTimeout(function() {
        el.classList.add('checking');
        if (i < targetIdx) {
          setTimeout(function() { el.classList.remove('checking'); el.classList.add('rejected'); }, 400);
        } else {
          setTimeout(function() {
            el.classList.remove('checking');
            el.classList.add('selected');
            log.textContent = '\u2192 ' + reason;
          }, 400);
        }
      }, i * 300);
    } else {
      setTimeout(function() { el.classList.add('rejected'); }, targetIdx * 300 + 500);
    }
  });
}

  el.classList.add('active');
}

// === System Map (Canvas) ===
function drawMap() {
  var canvas = document.getElementById('mapCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 450 * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = '450px';
  ctx.scale(dpr, dpr);
  var W = rect.width, H = 450;

  var nodes = [
    { x: 60, y: H/2, label: 'Telegram', color: '#58a6ff', icon: '\ud83d\udcac' },
    { x: 200, y: H/2, label: 'owpenbot', color: '#39d2c0', icon: '\ud83e\udd16' },
    { x: 350, y: H/2, label: 'ZeroClaw', color: '#f0883e', icon: '\u26a1' },
    { x: 520, y: H/2, label: 'Auto-Router', color: '#bc8cff', icon: '\ud83e\udde0' },
    { x: 700, y: 80, label: 'Ollama', color: '#3fb950', icon: '\ud83c\udfe0' },
    { x: 700, y: 170, label: 'Antigravity', color: '#3fb950', icon: '\ud83d\ude80' },
    { x: 700, y: 260, label: 'OpenRouter', color: '#58a6ff', icon: '\ud83c\udf10' },
    { x: 700, y: 350, label: 'Claude', color: '#f85149', icon: '\ud83d\udc8e' },
    { x: W - 80, y: H/2, label: 'Response', color: '#d29922', icon: '\ud83d\udce8' }
  ];

  var connections = [[0,1],[1,2],[2,3],[3,4],[3,5],[3,6],[3,7],[4,8],[5,8],[6,8],[7,8]];

  var particles = [];
  connections.forEach(function(c) {
    particles.push({ a: c[0], b: c[1], t: Math.random(), speed: 0.003 + Math.random() * 0.004 });
  });

  function draw() {
    ctx.clearRect(0, 0, W, H);

    connections.forEach(function(c) {
      ctx.beginPath();
      ctx.moveTo(nodes[c[0]].x, nodes[c[0]].y);
      ctx.lineTo(nodes[c[1]].x, nodes[c[1]].y);
      ctx.strokeStyle = 'rgba(48,54,61,0.8)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });

    particles.forEach(function(p) {
      p.t += p.speed;
      if (p.t > 1) p.t = 0;
      var ax = nodes[p.a].x, ay = nodes[p.a].y;
      var bx = nodes[p.b].x, by = nodes[p.b].y;
      var px = ax + (bx - ax) * p.t;
      var py = ay + (by - ay) * p.t;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI * 2);
      ctx.fillStyle = nodes[p.b].color;
      ctx.globalAlpha = 0.8;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    nodes.forEach(function(n) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, 30, 0, Math.PI * 2);
      ctx.fillStyle = '#161b22';
      ctx.fill();
      ctx.strokeStyle = n.color;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.font = '20px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#e6edf3';
      ctx.fillText(n.icon, n.x, n.y - 2);

      ctx.font = '600 11px Syne, sans-serif';
      ctx.fillStyle = '#e6edf3';
      ctx.fillText(n.label, n.x, n.y + 44);
    });

    requestAnimationFrame(draw);
  }
  draw();
}

// === Custom Cursor ===
var cursorEl = document.getElementById('cursor');
document.addEventListener('mousemove', function(e) {
  cursorEl.style.left = e.clientX - 10 + 'px';
  cursorEl.style.top = e.clientY - 10 + 'px';
});

// === Tab switching ===
document.getElementById('tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  tab.classList.add('active');
  var panel = document.getElementById('panel-' + tab.dataset.tab);
  if (panel) panel.classList.add('active');
  if (tab.dataset.tab === 'map') setTimeout(drawMap, 100);
});

// === Hover cursor effect ===
function setupCursorHover() {
  document.querySelectorAll('.tab, .sim-btn, .copy-btn, button, .phase-task, .state-node, .int-card, .card').forEach(function(el) {
    el.addEventListener('mouseenter', function() { cursorEl.classList.add('hover'); });
    el.addEventListener('mouseleave', function() { cursorEl.classList.remove('hover'); });
  });
}

// Init
buildContent();
setupCursorHover();
</script>
</body>
