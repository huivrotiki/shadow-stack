<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <header class="container mx-auto px-6 py-16 text-center">
    <h1 class="text-5xl font-bold mb-4 bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent">
      {{HEADLINE}}
    </h1>
    <p class="text-xl text-gray-400 mb-8">{{SUBHEADLINE}}</p>
    <a href="#cta" class="bg-purple-600 hover:bg-purple-500 px-8 py-3 rounded-full text-lg font-semibold transition">
      {{CTA_TEXT}}
    </a>
  </header>
  <section id="cta" class="container mx-auto px-6 py-24 text-center">
    <p class="text-gray-500 text-sm">Built by Agent Factory</p>
  </section>
</body>
</html>
