[server]
port = 4111
host = "127.0.0.1"

[control_center]
telegram_enabled = true
allowed_users_env = "TELEGRAM_ALLOWED_USERS"
default_agent = "claude-code"
autoresearch = "optional"

[agent.claude_code]
cmd = "claude"
cwd = "/Users/work/shadow-stack_local_1"
usage_check_url = "http://127.0.0.1:20128/v1/usage/anthropic"
fallback = "omniroute"

[agent.opencode]
cmd = "opencode"
cwd = "/Users/work/agent-factory"
fallback = "omniroute"

[agent.pi_coder]
cmd = "pi-coder"
fallback = "omniroute"

[agent.autoresearch]
type = "http"
url = "http://127.0.0.1:20128/v1/chat/completions"
fallback = "omniroute"

[provider.omni]
base_url = "http://127.0.0.1:20128/v1"
priority = "fallback"

[provider.ollama]
base_url = "http://127.0.0.1:11434"
model = "qwen2.5-coder:3b"
priority = "local-first"

[provider.omni]
base_url = "http://127.0.0.1:20130/v1"
api_key_env = "OMNIROUTE_KEY"

[session_protocol.github_skills]
enabled = true
cache_dir = "~/.cache/zeroclaw-skills"
update_check_on_session_start = true
update_check_on_phase_start = false
force_update_if_older_than_hours = 24

[session_protocol.github_skills.priorities]
opencode = 10
openclaw = 10
claude-code = 10
agent-framework = 9
browser-automation = 9
ralph-loop = 9
knowledge = 7
tutorials = 6
python = 5
selfhosted = 4
templates = 3
curated-lists = 2

[session_protocol.github_skills.performance]
max_parallel_clones = 3
max_parallel_updates = 5
clone_timeout_sec = 60
update_timeout_sec = 30

[session_protocol.github_skills.fallback]
on_clone_fail = "skip_and_continue"
on_update_fail = "use_cached"
on_index_fail = "use_previous_index"

[supermemory]
enabled = true
api_key_env = "SUPERMEMORY_API_KEY"
container_tag = "zeroclaw_shadow-stack"
auto_recall = true
auto_capture = true
max_recall_results = 10
profile_frequency = 50
capture_mode = "all"
debug = false
