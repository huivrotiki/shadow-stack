name: Bot Health Check

on:
  push:
    branches: [ main, master ]
    paths: ["bot/**", "package.json", ".github/workflows/bot-check.yml"]
  pull_request:
    branches: [ main, master ]
    paths: ["bot/**", "package.json", ".github/workflows/bot-check.yml"]

jobs:
  bot-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node -v
      - run: node -e "require('./bot/opencode-telegram-bridge.cjs'); console.log('OK')"
