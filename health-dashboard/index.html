<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Stack — Architecture Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #0a0b0f;
  --bg-main: #0f1117;
  --bg-sidebar: #12141c;
  --bg-panel: #161822;
  --bg-card: #1a1d28;
  --bg-hover: #1f2233;
  --bg-input: #181b24;
  
  --border-subtle: rgba(255,255,255,0.04);
  --border-default: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.12);
  
  --text-primary: #e8eaf0;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --text-code: #c9d1d9;
  
  --violet: #8b5cf6;
  --violet-soft: rgba(139,92,246,0.12);
  --violet-glow: rgba(139,92,246,0.4);
  
  --blue: #3b82f6;
  --blue-soft: rgba(59,130,246,0.12);
  
  --cyan: #06b6d4;
  --cyan-soft: rgba(6,182,212,0.12);
  
  --emerald: #10b981;
  --emerald-soft: rgba(16,185,129,0.12);
  
  --amber: #f59e0b;
  --amber-soft: rgba(245,158,11,0.12);
  
  --rose: #f43f5e;
  --rose-soft: rgba(244,63,94,0.12);
  
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --font-display: 'Space Grotesk', sans-serif;
  
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
}

html { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-sans);
  min-height: 100vh;
  display: flex;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ===== SIDEBAR ===== */
.sidebar {
  width: 64px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  z-index: 100;
}

.logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--violet), var(--blue));
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 12px;
  color: white;
  margin-bottom: 28px;
  box-shadow: 0 0 20px var(--violet-glow);
}

.nav {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.nav-btn {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  background: transparent;
}

.nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
.nav-btn.active { background: var(--violet-soft); color: var(--violet); }
.nav-btn svg { width: 20px; height: 20px; stroke-width: 1.5; }

/* ===== MAIN ===== */
.main {
  flex: 1;
  margin-left: 64px;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  background: var(--bg-sidebar);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.title {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 600;
  background: linear-gradient(135deg, var(--violet), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  background: var(--emerald-soft);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 20px;
  font-size: 10px;
  font-weight: 500;
  color: var(--emerald);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-btn {
  padding: 8px 16px;
  background: var(--violet-soft);
  border: 1px solid rgba(139,92,246,0.2);
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  color: var(--violet);
  cursor: pointer;
  transition: all 0.2s;
}

.header-btn:hover {
  background: var(--violet);
  color: white;
  box-shadow: 0 0 20px var(--violet-glow);
}

.header-btn.primary {
  background: var(--violet);
  color: white;
}

.header-btn.primary:hover {
  background: #9333ea;
}

/* ===== WORKSPACE ===== */
.workspace {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== CODE PANEL ===== */
.code-panel {
  width: 420px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-subtle);
}

.code-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.code-title svg { width: 14px; height: 14px; color: var(--violet); }

.code-actions {
  display: flex;
  gap: 6px;
}

.code-action-btn {
  padding: 4px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  font-size: 10px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}

.code-action-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }

.code-editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.code-area {
  flex: 1;
  background: var(--bg-deep);
  border: none;
  color: var(--text-code);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  padding: 16px;
  resize: none;
  outline: none;
  overflow-y: auto;
}

.code-area::placeholder { color: var(--text-muted); }

.code-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  border-top: 1px solid var(--border-subtle);
  font-size: 11px;
  color: var(--text-muted);
}

/* ===== PREVIEW PANEL ===== */
.preview-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-main);
}

.preview-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-subtle);
}

.preview-title {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.preview-controls {
  display: flex;
  gap: 8px;
}

.control-btn {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
}

.control-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.control-btn.active { background: var(--violet-soft); color: var(--violet); border-color: rgba(139,92,246,0.3); }

.preview-canvas {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  overflow: auto;
  background: 
    radial-gradient(circle at 50% 50%, rgba(139,92,246,0.03) 0%, transparent 50%),
    linear-gradient(rgba(255,255,255,0.01) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.01) 1px, transparent 1px);
  background-size: 100% 100%, 20px 20px, 20px 20px;
}

#mermaid-container {
  max-width: 100%;
  overflow: auto;
}

#mermaid-container svg {
  max-width: 100%;
  height: auto;
}

/* ===== TEMPLATES SIDEBAR ===== */
.templates-panel {
  width: 260px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.templates-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
}

.templates-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.template-item {
  padding: 12px;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.template-item:hover {
  background: var(--bg-hover);
  border-color: var(--border-default);
}

.template-item.active {
  background: var(--violet-soft);
  border-color: rgba(139,92,246,0.3);
}

.template-name {
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.template-desc {
  font-size: 10px;
  color: var(--text-muted);
  line-height: 1.5;
}

.template-preview {
  margin-top: 8px;
  padding: 8px;
  background: var(--bg-deep);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-muted);
  overflow: hidden;
  max-height: 40px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1200px) {
  .templates-panel { display: none; }
}

@media (max-width: 900px) {
  .code-panel { width: 320px; }
}

@media (max-width: 700px) {
  .workspace { flex-direction: column; }
  .code-panel { width: 100%; height: 40%; }
  .preview-canvas { padding: 20px; }
}

/* ===== LOADING ===== */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  color: var(--text-muted);
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border-subtle);
  border-top-color: var(--violet);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== ERROR ===== */
.error-display {
  padding: 20px;
  background: var(--rose-soft);
  border: 1px solid rgba(244,63,94,0.2);
  border-radius: var(--radius-md);
  color: var(--rose);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
}
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<nav class="sidebar">
  <div class="logo">SS</div>
  <div class="nav">
    <button class="nav-btn active" title="Architecture">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
        <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
        <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
        <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
      </svg>
    </button>
    <button class="nav-btn" title="Router">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
      </svg>
    </button>
    <button class="nav-btn" title="Providers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="3"></circle>
        <circle cx="12" cy="5" r="2"></circle>
        <circle cx="19" cy="12" r="2"></circle>
        <circle cx="12" cy="19" r="2"></circle>
        <circle cx="5" cy="12" r="2"></circle>
      </svg>
    </button>
    <button class="nav-btn" title="State Machine">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <circle cx="12" cy="12" r="8"></circle>
        <polyline points="12 8 12 12 15 14"></polyline>
      </svg>
    </button>
  </div>
</nav>

<!-- ===== MAIN ===== -->
<main class="main">
  
  <header class="header">
    <div class="header-left">
      <span class="title">Shadow Stack Architecture</span>
      <div class="header-badge">
        <span style="width:5px;height:5px;background:var(--emerald);border-radius:50%"></span>
        LIVE
      </div>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="exportPNG()">
        <span>Export PNG</span>
      </button>
      <button class="header-btn primary" onclick="renderDiagram()">
        <span>Render</span>
      </button>
    </div>
  </header>
  
  <div class="workspace">
    
    <!-- CODE PANEL -->
    <div class="code-panel">
      <div class="code-header">
        <div class="code-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
          Mermaid Code
        </div>
        <div class="code-actions">
          <button class="code-action-btn" onclick="formatCode()">Format</button>
          <button class="code-action-btn" onclick="copyCode()">Copy</button>
        </div>
      </div>
      <div class="code-editor">
        <textarea class="code-area" id="codeInput" spellcheck="false" placeholder="Enter Mermaid code here..."></textarea>
      </div>
      <div class="code-footer">
        <span id="lineCount">Lines: 0</span>
        <span id="charCount">Chars: 0</span>
      </div>
    </div>
    
    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
      <div class="preview-header">
        <div class="preview-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          Preview
        </div>
        <div class="preview-controls">
          <button class="control-btn active" onclick="zoomIn()" title="Zoom In">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="11" y1="8" x2="11" y2="14"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
          </button>
          <button class="control-btn" onclick="zoomOut()" title="Zoom Out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              <line x1="8" y1="11" x2="14" y2="11"></line>
            </svg>
          </button>
          <button class="control-btn" onclick="resetZoom()" title="Reset">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="14" height="14">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="preview-canvas" id="previewCanvas">
        <div id="mermaid-container">
          <div class="loading">
            <div class="loading-spinner"></div>
            <span>Rendering diagram...</span>
          </div>
        </div>
      </div>
    </div>
    
    <!-- TEMPLATES PANEL -->
    <div class="templates-panel">
      <div class="templates-header">📐 Templates</div>
      <div class="templates-list" id="templatesList"></div>
    </div>
    
  </div>
</main>

<script src="mermaid.min.js"></script>
<script>
// Mermaid Config
mermaid.initialize({
  startOnLoad: false,
  theme: 'dark',
  themeVariables: {
    primaryColor: '#8b5cf6',
    primaryTextColor: '#e8eaf0',
    primaryBorderColor: 'rgba(139,92,246,0.3)',
    lineColor: '#6b7280',
    secondaryColor: '#1a1d28',
    tertiaryColor: '#161822',
    fontFamily: 'Inter, sans-serif',
    fontSize: '13px'
  },
  flowchart: {
    useMaxWidth: true,
    htmlLabels: true,
    curve: 'basis',
    padding: 20,
    nodeSpacing: 50,
    rankSpacing: 60
  }
});

let currentZoom = 1;

// Templates
const templates = [
  {
    name: 'Request Flow',
    desc: 'User request routing through providers',
    code: `flowchart LR
    U[👤 User] --> Z[⚡ ZeroClaw]
    Z --> Q[🧠 Qwen 3B]
    Q --> R{Router}
    R -->|short| O1[Ollama 3B]
    R -->|long| O2[Ollama 7B]
    R -->|/deep| P[Perplexity]
    R -->|/premium| C[Claude]
    O1 --> RS[✅ Response]
    O2 --> RS
    P --> RS
    C --> RS`
  },
  {
    name: 'Provider Cascade',
    desc: 'Fallback chain visualization',
    code: `flowchart LR
    R[Request] --> O1[Ollama 3B]
    O1 -->|fail| O2[Ollama 7B]
    O2 -->|fail| AG[Antigravity]
    AG -->|fail| OR[OpenRouter]
    OR -->|fail| K[Kimi]
    K -->|fail| C[Claude]
    C -->|fail| H[Human Escalation]
    
    style O1 fill:#10b981,stroke:#10b981
    style O2 fill:#10b981,stroke:#10b981
    style AG fill:#06b6d4,stroke:#06b6d4
    style OR fill:#3b82f6,stroke:#3b82f6
    style K fill:#f59e0b,stroke:#f59e0b
    style C fill:#f43f5e,stroke:#f43f5e
    style H fill:#ef4444,stroke:#ef4444`
  },
  {
    name: 'State Machine',
    desc: 'Auto-router state transitions',
    code: `stateDiagram-v2
    [*] --> Idle
    Idle --> Routing : New Request
    Routing --> Executing : Route Matched
    Executing --> Done : Success
    Executing --> Error : All Failed
    Error --> Routing : Retry
    Done --> [*]
    Error --> Escalate : Max Retries
    Escalate --> [*]`
  },
  {
    name: 'System Architecture',
    desc: 'Full system overview',
    code: `flowchart TB
    subgraph Input
        TG[Telegram Bot]
        API[REST API]
        WS[WebSocket]
    end
    
    subgraph Core
        ZC[ZeroClaw]
        AR[Auto-Router]
        QW[Qwen 3B]
    end
    
    subgraph Providers
        OL[Ollama]
        AG[Antigravity]
        OR[OpenRouter]
        CL[Claude]
    end
    
    subgraph Output
        R[Response]
        L[Logger]
    end
    
    TG --> ZC
    API --> ZC
    WS --> ZC
    ZC --> QW
    QW --> AR
    AR --> OL
    AR --> AG
    AR --> OR
    AR --> CL
    OL --> R
    AG --> R
    OR --> R
    CL --> R
    R --> L`
  },
  {
    name: 'Meta-Escalation',
    desc: '3-tier escalation chain',
    code: `flowchart TB
    E[Escalate] --> T1{Tier 1}
    T1 -->|Perplexity| S1[Search + Reason]
    S1 -->|fail| T2{Tier 2}
    T2 -->|GPT-4o| F1[Fallback LLM]
    F1 -->|fail| T3{Tier 3}
    T3 -->|Telegram| H[Human Alert]
    
    style T1 fill:#3b82f6,stroke:#3b82f6
    style T2 fill:#8b5cf6,stroke:#8b5cf6
    style T3 fill:#f43f5e,stroke:#f43f5e`
  },
  {
    name: 'RAM Allocation',
    desc: 'Memory distribution on M1',
    code: `pie title RAM Distribution (8GB)
    "Ollama 3B" : 2048
    "macOS + Apps" : 2560
    "Free" : 3024
    "Node.js" : 350
    "ZeroClaw" : 5`
  }
];

// Render templates list
function renderTemplates() {
  const list = document.getElementById('templatesList');
  list.innerHTML = '';
  
  templates.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'template-item';
    item.innerHTML = `
      <div class="template-name">${t.name}</div>
      <div class="template-desc">${t.desc}</div>
      <div class="template-preview">${t.code.split('\n')[0]}...</div>
    `;
    item.onclick = () => loadTemplate(i);
    list.appendChild(item);
  });
}

// Load template
function loadTemplate(index) {
  const t = templates[index];
  document.getElementById('codeInput').value = t.code;
  updateStats();
  renderDiagram();
  
  document.querySelectorAll('.template-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}

// Render diagram
async function renderDiagram() {
  const code = document.getElementById('codeInput').value.trim();
  const container = document.getElementById('mermaid-container');
  
  if (!code) {
    container.innerHTML = '<div class="loading"><span style="color:var(--text-muted)">Enter Mermaid code to render</span></div>';
    return;
  }
  
  container.innerHTML = '<div class="loading"><div class="loading-spinner"></div><span>Rendering...</span></div>';
  
  try {
    const id = 'mermaid-' + Date.now();
    const { svg } = await mermaid.render(id, code);
    container.innerHTML = svg;
    container.style.transform = `scale(${currentZoom})`;
    container.style.transformOrigin = 'center center';
  } catch (err) {
    container.innerHTML = `<div class="error-display">Error: ${err.message}</div>`;
  }
}

// Zoom controls
function zoomIn() {
  currentZoom = Math.min(currentZoom + 0.1, 2);
  applyZoom();
}

function zoomOut() {
  currentZoom = Math.max(currentZoom - 0.1, 0.3);
  applyZoom();
}

function resetZoom() {
  currentZoom = 1;
  applyZoom();
}

function applyZoom() {
  const container = document.getElementById('mermaid-container');
  container.style.transform = `scale(${currentZoom})`;
}

// Copy code
function copyCode() {
  const code = document.getElementById('codeInput').value;
  navigator.clipboard.writeText(code);
}

// Format code (basic)
function formatCode() {
  const textarea = document.getElementById('codeInput');
  let code = textarea.value;
  // Basic formatting - ensure consistent indentation
  code = code.replace(/\n\s*\n/g, '\n');
  textarea.value = code;
  updateStats();
}

// Export PNG
function exportPNG() {
  const svg = document.querySelector('#mermaid-container svg');
  if (!svg) return;
  
  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  
  img.onload = () => {
    canvas.width = img.width * 2;
    canvas.height = img.height * 2;
    ctx.fillStyle = '#0f1117';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    
    const link = document.createElement('a');
    link.download = 'shadow-stack-architecture.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
  
  img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
}

// Update stats
function updateStats() {
  const code = document.getElementById('codeInput').value;
  document.getElementById('lineCount').textContent = `Lines: ${code.split('\n').length}`;
  document.getElementById('charCount').textContent = `Chars: ${code.length}`;
}

// Event listeners
document.getElementById('codeInput').addEventListener('input', () => {
  updateStats();
  clearTimeout(window.renderTimeout);
  window.renderTimeout = setTimeout(renderDiagram, 500);
});

// Init
renderTemplates();
loadTemplate(0);
</script>
